<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meal Planner">
<meta name="theme-color" content="#c4663a">
<title>Meal Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root {
  --cream: #fdf6ec;
  --warm-white: #fff8f0;
  --terracotta: #c4663a;
  --terra-light: #e8a87c;
  --brown: #8b4513;
  --brown-dark: #3d2b1f;
  --brown-mid: #6b3a1f;
  --brown-light: #a0785a;
  --border: #ddd0c0;
  --shadow: rgba(62,43,31,0.1);
  --green: #4a7c59;
  --green-bg: #e8f5ee;
  --tab-h: 64px;
  --hdr-h: 56px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--brown-dark);min-height:100vh;padding-bottom:var(--tab-h);}

/* ── Header ── */
.hdr{position:fixed;top:0;left:0;right:0;height:var(--hdr-h);background:var(--terracotta);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:100;box-shadow:0 2px 8px var(--shadow);}
.hdr h1{font-size:19px;font-weight:700;}
.hdr-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;}
.hdr-btn:active{background:rgba(255,255,255,.35);}

/* ── Tabs ── */
.tabs{position:fixed;bottom:0;left:0;right:0;height:var(--tab-h);background:var(--warm-white);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--brown-light);font-size:10px;font-weight:600;border:none;background:none;-webkit-tap-highlight-color:transparent;transition:color .15s;}
.tab.active{color:var(--terracotta);}
.tab-icon{font-size:22px;line-height:1;}

/* ── Content ── */
.content{margin-top:var(--hdr-h);padding:14px;min-height:calc(100vh - var(--hdr-h) - var(--tab-h));}

/* ── Cards ── */
.card{background:var(--warm-white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px var(--shadow);}
.card-title{font-size:17px;font-weight:700;color:var(--brown-dark);}
.card-sub{font-size:13px;color:var(--brown-light);margin-top:3px;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 18px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .15s;}
.btn:active{opacity:.72;}
.btn-primary{background:var(--terracotta);color:#fff;}
.btn-secondary{background:var(--border);color:var(--brown-dark);}
.btn-danger{background:#c53030;color:#fff;}
.btn-ghost{background:transparent;color:var(--terracotta);padding:6px 10px;}
.btn-full{width:100%;}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--tab-h) + 16px);right:16px;width:56px;height:56px;border-radius:50%;background:var(--terracotta);color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(196,102,58,.45);z-index:90;-webkit-tap-highlight-color:transparent;}
.fab:active{transform:scale(.93);}

/* ── Forms ── */
.fg{margin-bottom:14px;}
label{display:block;font-size:12px;font-weight:700;color:var(--brown);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
input,textarea,select{width:100%;padding:12px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;background:#fff;color:var(--brown-dark);outline:none;-webkit-appearance:none;font-family:inherit;}
input:focus,textarea:focus{border-color:var(--terracotta);}
textarea{min-height:80px;resize:vertical;}
.row2{display:flex;gap:10px;}
.row2 .fg{flex:1;margin-bottom:0;}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;}
.overlay.hidden{display:none;}
.modal{background:var(--warm-white);border-radius:20px 20px 0 0;padding:16px 18px calc(20px + env(safe-area-inset-bottom,0));width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal-handle{width:38px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-size:20px;font-weight:700;color:var(--brown-dark);margin-bottom:18px;}
.modal-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-row .modal-title{margin-bottom:0;}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.modal-actions .btn{flex:1;}

/* ── Ingredient rows (inside recipe view) ── */
.ing-row{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:1px solid var(--border);}
.ing-row:last-child{border-bottom:none;}
.ing-name{flex:1;font-size:15px;font-weight:500;}
.ing-qty{font-size:13px;color:var(--brown-light);white-space:nowrap;}
.ing-link{font-size:19px;text-decoration:none;}
.ing-btn{background:none;border:none;font-size:18px;cursor:pointer;padding:4px;-webkit-tap-highlight-color:transparent;}

/* ── Week plan ── */
.week-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.week-row:last-child{border-bottom:none;}
.wk-check{width:26px;height:26px;border-radius:7px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
.wk-check.on{background:var(--terracotta);border-color:var(--terracotta);color:#fff;}
.wk-name{flex:1;font-size:16px;font-weight:500;}

/* ── Shopping list ── */
.shop-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
.shop-item:last-child{border-bottom:none;}
.shop-cb{width:26px;height:26px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;font-size:14px;}
.shop-cb.on{background:var(--green);border-color:var(--green);color:#fff;}
.shop-info{flex:1;min-width:0;}
.shop-name{font-size:16px;font-weight:500;}
.shop-item.done .shop-name{text-decoration:line-through;color:var(--brown-light);}
.shop-qty{font-size:13px;color:var(--brown-light);}
.pantry-btn{background:none;border:none;font-size:19px;cursor:pointer;padding:3px;opacity:.45;-webkit-tap-highlight-color:transparent;}
.pantry-btn.on{opacity:1;}
.shop-link{font-size:20px;text-decoration:none;}
.pantry-tag{font-size:11px;background:#fff3cd;color:#7d5a00;padding:1px 6px;border-radius:4px;border:1px solid #e6c000;margin-left:4px;vertical-align:middle;}

/* ── Section label ── */
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--brown-light);margin:14px 0 6px;}

/* ── Settings ── */
.set-block{background:var(--warm-white);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.set-block h3{font-size:16px;font-weight:700;margin-bottom:12px;}
.status-bar{display:flex;align-items:center;gap:8px;padding:10px 13px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:12px;}
.status-bar.ok{background:var(--green-bg);color:var(--green);}
.status-bar.warn{background:#fff3cd;color:#7d5a00;}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(var(--tab-h) + 74px);left:50%;transform:translateX(-50%);background:var(--brown-dark);color:#fff;padding:10px 22px;border-radius:20px;font-size:14px;z-index:400;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;}

/* ── Empty ── */
.empty{text-align:center;padding:52px 24px;color:var(--brown-light);}
.empty-icon{font-size:52px;margin-bottom:12px;}
.empty p{font-size:16px;line-height:1.5;}

/* ── Loading ── */
.loading{text-align:center;padding:52px;color:var(--brown-light);font-size:16px;}
.macro-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:14px;}
.macro-box{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:7px 4px;text-align:center;}
.macro-val{font-size:16px;font-weight:700;color:var(--brown-dark);}
.macro-lbl{font-size:10px;font-weight:600;color:var(--brown-light);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.macro-compact{font-size:12px;color:var(--brown-light);margin-top:5px;}
.card-photo{width:calc(100% + 32px);margin:-14px -16px 12px;height:160px;object-fit:cover;border-radius:12px 12px 0 0;display:block;}
.view-photo{width:calc(100% + 36px);margin:-4px -18px 14px;height:220px;object-fit:cover;border-radius:16px 16px 0 0;display:block;}
</style>
</head>
<body>

<div class="hdr">
  <span style="width:38px"></span>
  <h1 id="hdr-title">My Recipes</h1>
  <button class="hdr-btn" id="hdr-btn" style="display:none" onclick="hdrAction()">+</button>
</div>

<div class="content" id="content">
  <div class="loading">Loading your meal planner…</div>
</div>

<button class="fab" id="fab" style="display:none" onclick="fabAction()">+</button>

<div class="tabs">
  <button class="tab active" data-view="recipes" onclick="switchView('recipes')">
    <span class="tab-icon">📋</span><span>Recipes</span>
  </button>
  <button class="tab" data-view="week" onclick="switchView('week')">
    <span class="tab-icon">📅</span><span>This Week</span>
  </button>
  <button class="tab" data-view="shopping" onclick="switchView('shopping')">
    <span class="tab-icon">🛒</span><span>Shopping</span>
  </button>
  <button class="tab" data-view="settings" onclick="switchView('settings')">
    <span class="tab-icon">⚙️</span><span>Settings</span>
  </button>
</div>

<!-- Recipe add/edit modal -->
<div class="overlay hidden" id="recipe-overlay">
  <div class="modal" id="recipe-modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="recipe-modal-title">Add Recipe</div>
    <div class="fg"><label>Recipe Name</label>
      <input type="text" id="r-name" placeholder="e.g. Chicken Tacos"></div>
    <div class="fg"><label>Notes / Instructions (optional)</label>
      <textarea id="r-notes" placeholder="e.g. Marinate 30 min before cooking…"></textarea></div>
    <div class="sec-lbl" style="margin-top:4px">Nutrition Per Serving (optional)</div>
    <div class="row2">
      <div class="fg"><label>Servings</label><input type="number" id="r-servings" placeholder="e.g. 4" min="1" step="1"></div>
      <div class="fg"><label>Calories</label><input type="number" id="r-cal" placeholder="0" min="0"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Protein (g)</label><input type="number" id="r-protein" placeholder="0" min="0"></div>
      <div class="fg"><label>Carbs (g)</label><input type="number" id="r-carbs" placeholder="0" min="0"></div>
    </div>
    <div class="row2">
      <div class="fg"><label>Fat (g)</label><input type="number" id="r-fat" placeholder="0" min="0"></div>
      <div class="fg"><label>Fiber (g)</label><input type="number" id="r-fiber" placeholder="0" min="0"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('recipe-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveRecipe()">Save</button>
    </div>
    <div id="recipe-del-zone" style="margin-top:10px;display:none">
      <button class="btn btn-danger btn-full" onclick="deleteRecipe()">Delete Recipe</button>

  </div>
</div>

<!-- Recipe view modal (ingredients) -->
<div class="overlay hidden" id="view-overlay" onclick="overlayTap(event,'view-overlay')">
  <div class="modal">
    <div class="modal-handle"></div>
    <img id="view-photo" class="view-photo" style="display:none" onerror="this.style.display='none'" alt="">
    <div class="modal-row">
      <div class="modal-title" id="view-title"></div>
      <button class="btn btn-ghost" onclick="editCurrentRecipe()">Edit</button>
    </div>
    <div id="view-notes" style="font-size:14px;color:var(--brown-light);margin-bottom:12px;white-space:pre-wrap;display:none"></div>
    <div id="view-macros" style="display:none">
      <div class="sec-lbl" id="view-macros-label">Per Serving</div>
      <div class="macro-grid" id="view-macros-grid"></div>
    </div>
    <button id="calc-btn" class="btn btn-secondary btn-full" style="margin-bottom:12px;display:none" onclick="calculateMacros()">✨ Calculate Macros with AI</button>
    <div class="sec-lbl">Ingredients</div>
    <div id="view-ings"></div>
    <button class="btn btn-primary btn-full" style="margin-top:14px" onclick="openIngModal(null)">+ Add Ingredient</button>
    <div style="text-align:center;margin-top:10px">
      <button id="photo-btn" class="btn btn-ghost" style="font-size:13px;color:var(--brown-light)" onclick="triggerPhotoUpload()">📷 Add Photo</button>
    </div>
  </div>
</div>

<!-- Ingredient add/edit modal -->
<div class="overlay hidden" id="ing-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="ing-modal-title">Add Ingredient</div>

      <div class="fg"><label>Amount</label>
        <input type="text" id="i-qty" placeholder="e.g. 2, 1/2"></div>

      <input type="url" id="i-walmart" placeholder="https://www.walmart.com/ip/…">

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeIngModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveIng()">Save</button>

    <div id="ing-del-zone" style="margin-top:10px;display:none">
      <button class="btn btn-danger btn-full" onclick="deleteIng()">Remove Ingredient</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="paprika-file" accept=".paprikarecipes" style="display:none" onchange="handlePaprikaFile(event)">
<input type="file" id="photo-file" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">

<script>
// ── Config ──────────────────────────────────────────────────
const OWNER = 'justintrich94', REPO = 'meal-planner', FILE = 'data.json', BRANCH = 'main';

// ── State ────────────────────────────────────────────────────
const S = {
  data: { recipes:[], ingredientLinks:{}, weekPlan:{recipeIds:[]}, pantryStaples:[], checkedItems:[] },
  sha: null,
  token: localStorage.getItem('mp_token') || '',
  anthropicKey: localStorage.getItem('mp_anthropic_key') || '',
  view: 'recipes',
  viewId: null,
  editId: null,
  ingId: null,
  saving: false,
  saveQueued: false,
};

// ── Utilities ────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const key = name => (name||'').trim().toLowerCase();

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function toast(msg, ms=2400){
  const t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ── Quantity math ─────────────────────────────────────────────
function parseQty(s){
  if(!s) return null;
  s=s.trim();
  let m=s.match(/^(\d+)\s+(\d+)\/(\d+)$/);
  if(m) return +m[1]+ +m[2]/+m[3];
  m=s.match(/^(\d+)\/(\d+)$/);
  if(m) return +m[1]/+m[2];
  const n=parseFloat(s);
  return isNaN(n)?null:n;
}

function fmtQty(n){
  const fracs=[[.25,'1/4'],[1/3,'1/3'],[.5,'1/2'],[2/3,'2/3'],[.75,'3/4']];
  const w=Math.floor(n), f=n-w;
  if(f<.01) return String(w);
  for(const [d,s] of fracs) if(Math.abs(f-d)<.04) return w?`${w} ${s}`:s;
  return (Math.round(n*100)/100).toString();
}

const unitNorm = {
  cups:'cup',cup:'cup',tbsp:'tbsp',tablespoon:'tbsp',tablespoons:'tbsp',
  tsp:'tsp',teaspoon:'tsp',teaspoons:'tsp',
  oz:'oz',ounce:'oz',ounces:'oz',lb:'lb',lbs:'lb',pound:'lb',pounds:'lb',
  g:'g',gram:'g',grams:'g',kg:'kg',kilogram:'kg',kilograms:'kg',
  ml:'ml',milliliter:'ml',milliliters:'ml',l:'l',liter:'l',liters:'l',
  clove:'clove',cloves:'clove',can:'can',cans:'can',
  slice:'slice',slices:'slice',piece:'piece',pieces:'piece',
  pinch:'pinch',dash:'dash',handful:'handful',
};
const unitPlural = {cup:'cups',clove:'cloves',can:'cans',slice:'slices',piece:'pieces',handful:'handfuls',lb:'lbs'};

function normUnit(u){ return u ? (unitNorm[(u||'').trim().toLowerCase()] || (u||'').trim().toLowerCase()) : ''; }
function dispUnit(u,n){ return (n>1 && unitPlural[u]) ? unitPlural[u] : u; }

function getShoppingList(){
  const {recipes,weekPlan,ingredientLinks,pantryStaples,checkedItems} = S.data;
  const selected = recipes.filter(r=>weekPlan.recipeIds.includes(r.id));
  const acc={};
  for(const recipe of selected){
    for(const ing of (recipe.ingredients||[])){
      const nm=ing.name.trim(), normNm=key(nm);
      const nu=normUnit(ing.unit||'');
      const k=`${normNm}||${nu}`;
      const qty=parseQty(ing.quantity||'');
      if(!acc[k]) acc[k]={name:nm,normNm,unit:nu,total:0,numeric:true,rawParts:[]};
      if(qty!==null){ acc[k].total+=qty; acc[k].rawParts.push(`${fmtQty(qty)}${nu?' '+nu:''}`); }
      else { acc[k].numeric=false; acc[k].rawParts.push(`${ing.quantity||''}${nu?' '+nu:''}`); }
    }
  }
  return Object.entries(acc).map(([k,v])=>{
    const wUrl=ingredientLinks[v.normNm]||null;
    const isPantry=pantryStaples.includes(v.normNm);
    const isChecked=checkedItems.includes(k);
    let dQty;
    if(v.numeric && v.rawParts.length){
      dQty=fmtQty(v.total)+(v.unit?' '+dispUnit(v.unit,v.total):'');
    } else {
      dQty=v.rawParts.join(' + ');
    }
    return {k,name:v.name,normNm:v.normNm,dQty,wUrl,isPantry,isChecked};
  });
}

// ── GitHub API ───────────────────────────────────────────────
async function ghGet(path){
  const h={'Accept':'application/vnd.github.v3+json'};
  if(S.token) h['Authorization']=`token ${S.token}`;
  return fetch(`https://api.github.com/repos/${OWNER}/${REPO}/${path}`,{headers:h});
}
async function ghPut(path,body){
  const h={'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'};
  if(S.token) h['Authorization']=`token ${S.token}`;
  return fetch(`https://api.github.com/repos/${OWNER}/${REPO}/${path}`,{method:'PUT',headers:h,body:JSON.stringify(body)});
}

async function loadData(){
  try{
    const r=await ghGet(`contents/${FILE}?ref=${BRANCH}`);
    if(r.status===404) return; // start fresh
    if(!r.ok) throw new Error(r.status);
    const j=await r.json();
    S.sha=j.sha;
    const parsed=JSON.parse(atob(j.content.replace(/\n/g,'')));
    S.data={...S.data,...parsed};
  } catch(e){ console.warn('Load:',e); toast('Could not load data — check Settings'); }
}

async function saveData(){
  if(!S.token){ toast('⚠️ Add a GitHub token in Settings to save'); return false; }
  const content=btoa(unescape(encodeURIComponent(JSON.stringify(S.data,null,2))));
  const body={message:'Update meal plan data',content,branch:BRANCH};
  if(S.sha) body.sha=S.sha;
  try{
    const r=await ghPut(`contents/${FILE}`,body);
    if(r.status===409){ await loadData(); return saveData(); } // SHA conflict — reload & retry
    if(!r.ok){ const e=await r.json(); throw new Error(e.message||r.status); }
    const j=await r.json();
    S.sha=j.content.sha;
    return true;
  } catch(e){ console.error('Save:',e); toast('Save failed: '+e.message); return false; }
}

let _saveTimer=null;
async function scheduleSave(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    _saveTimer=null;
    if(S.saving){ scheduleSave(); return; }
    S.saving=true;
    const ok=await saveData();
    S.saving=false;
    if(ok) toast('✓ Saved');
  },900);
}

// ── Navigation ───────────────────────────────────────────────
const TITLES={recipes:'My Recipes',week:'This Week',shopping:'Shopping List',settings:'Settings',links:'Walmart Links'};

function switchView(v){
  S.view=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v&&v!=='links'));
  $('hdr-title').textContent=TITLES[v];
  render();
}

// ── Shopping view ─────────────────────────────────────────────
function renderShopping(){
  const c=$('content');
  if(!S.data.weekPlan.recipeIds.length){
    c.innerHTML=`<div class="empty"><div class="empty-icon">🛒</div><p>Select recipes in "This Week"<br>to build your shopping list.</p></div>`;

    return;
  }
  const needed=list.filter(i=>!i.isChecked&&!i.isPantry);

  const done=list.filter(i=>i.isChecked);

// ── Photo handling ────────────────────────────────────────────
function photoUrl(path){
  return `https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${path}`;
}

async function resizeImage(base64Data, maxWidth=800, quality=0.78){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxWidth/img.width);
      const w=Math.round(img.width*ratio), h=Math.round(img.height*ratio);
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality).split(',')[1]);
    };
    img.onerror=reject;
    img.src=`data:image/jpeg;base64,${base64Data}`;
  });
}

async function uploadImageToGitHub(recipeId, base64Data){
  const path=`images/${recipeId}.jpg`;
  const body={message:`Add recipe photo`,content:base64Data,branch:BRANCH};
  let res=await ghPut(`contents/${path}`,body);
  if(res.status===422||res.status===409){
    const ex=await ghGet(`contents/${path}?ref=${BRANCH}`);
    if(ex.ok){ const j=await ex.json(); body.sha=j.sha; res=await ghPut(`contents/${path}`,body); }
  }
  if(!res.ok){ const e=await res.json(); throw new Error(e.message||`Upload failed: ${res.status}`); }
  return path;
}

async function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>resolve(e.target.result.split(',')[1]);
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function triggerPhotoUpload(){
  $('photo-file').value='';
  $('photo-file').click();
}

async function handlePhotoSelect(event){
  const file=event.target.files[0];
  if(!file||!S.viewId) return;
  if(!S.token){ toast('Add a GitHub token in ⚙️ Settings first'); return; }
  toast('Uploading photo…',99999);
  try{
    const base64=await fileToBase64(file);
    const resized=await resizeImage(base64,800,0.78);
    const path=await uploadImageToGitHub(S.viewId,resized);
    const r=S.data.recipes.find(x=>x.id===S.viewId);
    if(r) r.photo=path;
    $('toast').classList.remove('show');
    openViewModal(S.viewId);
    render();
    scheduleSave();
    toast('✓ Photo saved');
  } catch(e){
    $('toast').classList.remove('show');
    console.error('Photo upload error:',e);
    toast('Photo upload failed: '+e.message,4000);
  }
}

// ── AI Macro Calculator ───────────────────────────────────────
async function calculateMacros(){
  if(!S.anthropicKey){ toast('Add an Anthropic API key in ⚙️ Settings first'); return; }
  const r=S.data.recipes.find(x=>x.id===S.viewId);
  if(!r||(r.ingredients||[]).length===0){ toast('Add ingredients first'); return; }

  const ingList=r.ingredients.map(i=>[i.quantity,i.unit,i.name].filter(Boolean).join(' ')).join('\n');
  toast('Calculating macros…',99999);
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':S.anthropicKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:300,
        messages:[{role:'user',content:`Estimate nutrition for this recipe: "${r.name}"

Ingredients:
${ingList}
${r.servings?`\nServings: ${r.servings}`:''}

Reply with ONLY a JSON object, no explanation:
{"servings":<number>,"calories":<kcal per serving>,"protein":<g per serving>,"carbs":<g per serving>,"fat":<g per serving>,"fiber":<g per serving>}`}]
      })
    });
    if(!res.ok){ const e=await res.json(); throw new Error(e.error?.message||`API error ${res.status}`); }
    const data=await res.json();
    const match=data.content[0].text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('Unexpected AI response format');
    const result=JSON.parse(match[0]);
    r.macros={
      calories:Math.round(result.calories)||0,
      protein:Math.round(result.protein)||0,
      carbs:Math.round(result.carbs)||0,
      fat:Math.round(result.fat)||0,
      fiber:Math.round(result.fiber)||0,
    };
    if(result.servings&&!r.servings) r.servings=Math.round(result.servings);
    $('toast').classList.remove('show');
    openViewModal(S.viewId);
    scheduleSave();
    toast('✓ Macros calculated and saved');
  } catch(e){
    $('toast').classList.remove('show');
    console.error('Macro AI error:',e);
    toast('Calculation failed: '+e.message, 4000);
  }
}

// ── Walmart Links Manager ─────────────────────────────────────
function renderLinks(){
  const allIngs=new Map();
  for(const r of S.data.recipes)
    for(const ing of (r.ingredients||[])){ const nm=key(ing.name); if(!allIngs.has(nm)) allIngs.set(nm,ing.name.trim()); }

  if(!allIngs.size){
    $('content').innerHTML=`<div class="empty"><div class="empty-icon">🔗</div><p>Add recipes with ingredients first.</p></div>`;
    return;
  }

  const sorted=[...allIngs.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  const missing=sorted.filter(([nm])=>!S.data.ingredientLinks[nm]);
  const linked=sorted.filter(([nm])=>S.data.ingredientLinks[nm]);

  let html=`<div style="font-size:13px;color:var(--brown-light);margin-bottom:12px">${linked.length} of ${sorted.length} ingredients linked</div>`;

  if(missing.length){
    html+=`<div class="sec-lbl">Needs a Link (${missing.length})</div><div class="card">`;
    for(const [nm,displayName] of missing)
      html+=`<div class="ing-row">
        <span class="ing-name">${esc(displayName)}</span>
        <button class="btn btn-ghost" style="font-size:13px;padding:6px 12px;flex-shrink:0" data-nm="${esc(nm)}" onclick="editLink(this.dataset.nm)">+ Add</button>
      </div>`;
    html+=`</div>`;
  }

  if(linked.length){
    html+=`<div class="sec-lbl">Linked ✓ (${linked.length})</div><div class="card">`;
    for(const [nm,displayName] of linked){
      const url=S.data.ingredientLinks[nm];
      html+=`<div class="ing-row">
        <div style="flex:1;min-width:0">
          <div class="ing-name">${esc(displayName)}</div>
          <div style="font-size:11px;color:var(--brown-light);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:220px">${esc(url)}</div>
        </div>
        <a href="${esc(url)}" target="_blank" rel="noopener" style="font-size:20px;text-decoration:none;margin-right:4px">🔗</a>
        <button class="ing-btn" data-nm="${esc(nm)}" onclick="editLink(this.dataset.nm)" title="Edit">✏️</button>
      </div>`;
    }
    html+=`</div>`;
  }

  $('content').innerHTML=html;
}

function editLink(nm){
  const current=S.data.ingredientLinks[nm]||'';
  const displayName=[...S.data.recipes.flatMap(r=>(r.ingredients||[]).filter(i=>key(i.name)===nm).map(i=>i.name.trim()))][0]||nm;
  const url=prompt(`Paste Walmart link for "${displayName}":${current?'\n\nCurrent: '+current:''}`,current);
  if(url===null) return;
  if(url.trim().startsWith('http')) S.data.ingredientLinks[nm]=url.trim();
  else if(!url.trim()) delete S.data.ingredientLinks[nm];
  renderLinks();
  scheduleSave();
}

// ── Paprika Import ────────────────────────────────────────────
function triggerPaprikaImport(){
  $('paprika-file').value='';
  $('paprika-file').click();
}

async function gunzip(uint8arr){
  if(typeof DecompressionStream==='undefined') throw new Error('Your browser does not support this import. Please update iOS and try again.');
  const ds=new DecompressionStream('gzip');
  const stream=new Blob([uint8arr]).stream().pipeThrough(ds);
  const reader=stream.getReader();
  const chunks=[];
  while(true){ const {done,value}=await reader.read(); if(done) break; chunks.push(value); }
  const out=new Uint8Array(chunks.reduce((s,c)=>s+c.length,0));
  let off=0; for(const c of chunks){ out.set(c,off); off+=c.length; }
  return new TextDecoder().decode(out);
}

function parseIngLine(line){
  line=(line||'').trim().replace(/^[-•*]\s*/,'');
  if(!line) return null;
  const U='cups?|tablespoons?|tbsps?\\.?|teaspoons?|tsps?\\.?|ounces?|oz\\.?|pounds?|lbs?\\.?|grams?|g\\.?|kg|ml|milliliters?|liters?|cloves?|cans?|slices?|pieces?|pinch(?:es)?|dash(?:es)?|handfuls?|stalks?|heads?|bunches?|sprigs?|packets?|envelopes?|sticks?|bars?|links?|strips?';
  const Q='(?:\\d+\\s+)?(?:\\d+\\/\\d+|\\d+\\.\\d+|\\d+)';
  let m=line.match(new RegExp(`^(${Q})\\s+(${U})\\s+(.+)$`,'i'));
  if(m) return {id:uid(),quantity:m[1].trim(),unit:m[2].trim(),name:m[3].trim()};
  m=line.match(/^(\d+(?:\s+\d+\/\d+|\.\d+)?)\s+(.+)$/);
  if(m) return {id:uid(),quantity:m[1].trim(),unit:'',name:m[2].trim()};
  return {id:uid(),quantity:'',unit:'',name:line};
}

async function handlePaprikaFile(event){
  const file=event.target.files[0];
  if(!file) return;
  toast('Reading file…',99999);
  try{
    if(typeof JSZip==='undefined') throw new Error('Could not load JSZip — check your internet connection and try again');
    const zip=await JSZip.loadAsync(await file.arrayBuffer());
    const entries=Object.values(zip.files).filter(f=>!f.dir&&f.name.endsWith('.paprikarecipe'));
    if(!entries.length) throw new Error('No recipes found in this file — make sure you exported from Paprika');

    const parsed=[];
    for(const entry of entries){
      try{
        const data=JSON.parse(await gunzip(await entry.async('uint8array')));
        if(!data.name) continue;
        const ingredients=(data.ingredients||'').split('\n').map(parseIngLine).filter(i=>i&&i.name);
        const noteParts=[data.directions,data.notes].filter(s=>(s||'').trim());
        parsed.push({id:uid(),name:data.name.trim(),notes:noteParts.join('\n\n---\n\n').trim(),ingredients,_photoData:data.photo_data||null});
      } catch(e){ console.warn('Skipping one recipe:',e); }
    }
    if(!parsed.length) throw new Error('Could not read any recipes — the file may be corrupted');

    // Reload fresh data from GitHub before importing so our SHA is current
    $('toast').classList.remove('show');
    toast('Checking GitHub…',99999);
    await loadData();

    // Split into new recipes vs already-existing ones (matched by name)
    const existingMap=new Map(S.data.recipes.map(r=>[r.name.toLowerCase(),r]));
    const fresh=parsed.filter(r=>!existingMap.has(r.name.toLowerCase()));
    const toUpdate=parsed.filter(r=>existingMap.has(r.name.toLowerCase())&&r._photoData&&!existingMap.get(r.name.toLowerCase()).photo);

    $('toast').classList.remove('show');
    if(!fresh.length&&!toUpdate.length){
      toast('All recipes already imported and have photos'); return;
    }

    let msg='';
    if(fresh.length) msg+=`${fresh.length} new recipe${fresh.length!==1?'s':''} to add`;
    if(toUpdate.length) msg+=(msg?'\n':'')+ `${toUpdate.length} existing recipe${toUpdate.length!==1?'s':''} will get their photos added`;
    if(!confirm(msg+'\n\nContinue?')) return;

    // Separate photo data — never stored in data.json
    const photoQueue=[];
    for(const r of fresh){
      if(r._photoData) photoQueue.push({id:r.id,name:r.name,data:r._photoData});
      delete r._photoData;
    }
    for(const r of toUpdate){
      const existing=existingMap.get(r.name.toLowerCase());
      if(existing) photoQueue.push({id:existing.id,name:existing.name,data:r._photoData,existingId:existing.id});
      delete r._photoData;
    }

    if(fresh.length){
      S.data.recipes.push(...fresh);
      render();
      toast('Saving recipes…',99999);
      const ok=await saveData();
      $('toast').classList.remove('show');
      if(!ok){
        await loadData(); render();
        alert('Recipes were read but could not be saved to GitHub.\n\nCheck your GitHub token in Settings, then try again.');
        return;
      }
    }

    // Upload photos one by one
    let uploaded=0;
    if(photoQueue.length){
      for(const item of photoQueue){
        try{
          toast(`Uploading photos… ${uploaded+1} of ${photoQueue.length}`,99999);
          const resized=await resizeImage(item.data,800,0.78);
          const targetId=item.existingId||item.id;
          const path=await uploadImageToGitHub(targetId,resized);
          const r=S.data.recipes.find(x=>x.id===targetId);
          if(r) r.photo=path;
          uploaded++;
        } catch(e){ console.warn(`Photo failed for ${item.name}:`,e); }
      }
      if(uploaded>0){ toast('Saving photo info…',99999); await saveData(); }
    }

    $('toast').classList.remove('show');
    render();
    const parts=[];
    if(fresh.length) parts.push(`${fresh.length} recipe${fresh.length!==1?'s':''} imported`);
    if(uploaded) parts.push(`${uploaded} photo${uploaded!==1?'s':''} added`);
    toast('✓ '+parts.join(', '), 3500);
  } catch(e){
    $('toast').classList.remove('show');
    console.error('Import error:',e);
    toast('Import failed: '+e.message,5000);
  }
}

// ── Init ──────────────────────────────────────────────────────
(async()=>{
  await loadData();
  render();
})();
</script>
